services:
  postgres-test:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: agrofount_test
      POSTGRES_PASSWORD: agrofount_test
      POSTGRES_DB: agrofount_test
    ports:
      - '127.0.0.1:55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agrofount_test -d agrofount_test']
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7.4.2-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '127.0.0.1:56379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 20
