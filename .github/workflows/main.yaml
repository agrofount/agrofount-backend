name: Build and Deploy App
on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Deploy the current main commit to production
        required: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    uses: ./.github/workflows/template.yaml
    with:
      environment: dev
      service: agrofount-service-dev
      task-def: ./ecs/dev/task-definition.json
      container-name: agrofount-port

  deploy-prod:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy_production)
    uses: ./.github/workflows/template.yaml
    with:
      environment: prod
      service: agrofounts-service-prod
      task-def: ./ecs/prod/task-definition.json
      container-name: agrofount-port-prod
